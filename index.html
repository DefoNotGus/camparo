<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Camparo</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Load Vue 3 directly from CDN (No npm required) -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <style>
        .floating-container {
            position: fixed;
            bottom: 24px;
            right: 24px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            z-index: 50;
        }
        .bubble-link {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            transition: transform 0.2s ease-in-out;
        }
        .bubble-link:hover {
            transform: scale(1.1);
        }
        .bubble-link img {
            width: 24px;
            height: 24px;
        }
    </style>
</head>
<body class="bg-gray-900 text-white h-screen overflow-hidden">
    <!-- Vue Application Container -->
    <div id="app" class="flex flex-col h-full">
        <!-- Header / Controls -->
        <header class="flex items-center justify-between px-6 py-3 bg-gray-800 border-b border-gray-700 shadow-md">
            <h1 class="text-xl font-semibold tracking-wide text-blue-400">Code Comparer</h1>
            
            <div class="flex items-center space-x-6">
                <!-- Language Selector -->
                <div class="flex items-center space-x-2">
                    <label for="language" class="text-sm text-gray-300">Language:</label>
                    <select v-model="language" id="language" class="bg-gray-700 border border-gray-600 text-white text-sm rounded focus:ring-blue-500 focus:border-blue-500 block p-1.5 outline-none">
                        <option value="javascript">JavaScript</option>
                        <option value="react">React</option>
                        <option value="vue">Vue</option>
                        <option value="python">Python</option>
                        <option value="java">Java</option>
                        <option value="csharp">C#</option>
                        <option value="yaml">YAML</option>
                        <option value="markdown">Markdown</option>
                        <option value="html">HTML</option>
                        <option value="css">CSS</option>
                        <option value="json">JSON</option>
                        <option value="cpp">C++</option>
                        <option value="sql">SQL</option>
                    </select>
                </div>

                <!-- View Toggle -->
                <div class="flex items-center space-x-2">
                    <label for="view-toggle" class="text-sm text-gray-300 cursor-pointer">Inline View</label>
                    <label class="relative inline-flex items-center cursor-pointer">
                        <input type="checkbox" v-model="inlineView" id="view-toggle" class="sr-only peer">
                        <div class="w-9 h-5 bg-gray-600 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-blue-500"></div>
                    </label>
                </div>
            </div>
        </header>

        <!-- Editor Container -->
        <main id="editor-container" class="flex-grow w-full"></main>
    </div>

    <div class="floating-container">
        <a href="https://linktr.ee/defonotgus" target="_blank" class="bubble-link" style="background-color: #43E660;" title="Linktree">
            <img src="https://cdn.simpleicons.org/linktree/white" alt="Linktree" />
        </a>
        <a href="https://github.com/DefoNotGus" target="_blank" class="bubble-link" style="background-color: #333333;" title="GitHub">
            <img src="https://cdn.simpleicons.org/github/white" alt="GitHub" />
        </a>
        <a href="https://www.buymeacoffee.com/defonotgus" target="_blank" class="bubble-link" style="background-color: #FFDD00;" title="Buy me a coffee">
            <img src="https://cdn.simpleicons.org/buymeacoffee/000000" alt="Buy Me A Coffee" />
        </a>
    </div>

    <!-- Monaco Editor Loader -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs/loader.js"></script>
    <script>
        const { createApp, ref, onMounted, watch } = Vue;

        const defaultOriginal = `function calculateTotal(items) {\n    let total = 0;\n    for (let i = 0; i < items.length; i++) {\n        total += items[i].price;\n    }\n    return total;\n}`;
        const defaultModified = `function calculateTotal(items) {\n    // Using modern array methods\n    return items.reduce((total, item) => {\n        return total + item.price;\n    }, 0);\n}`;

        // Helper function to map our selected language to Monaco's supported languages
        function getMonacoLanguage(lang) {
            if (lang === 'vue') return 'html';
            if (lang === 'react') return 'javascript';
            return lang;
        }

        createApp({
            setup() {
                // Vue Reactive State
                const language = ref('javascript');
                const inlineView = ref(false);
                
                let diffEditor = null;
                let originalModel = null;
                let modifiedModel = null;

                onMounted(() => {
                    // Initialize Monaco Editor once the DOM is ready
                    require.config({ paths: { 'vs': 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs' }});
                    require(['vs/editor/editor.main'], function() {
                        diffEditor = monaco.editor.createDiffEditor(document.getElementById('editor-container'), {
                            theme: 'vs-dark',
                            originalEditable: true,
                            renderSideBySide: !inlineView.value,
                            automaticLayout: true
                        });

                        const initialMonacoLang = getMonacoLanguage(language.value);

                        originalModel = monaco.editor.createModel(defaultOriginal, initialMonacoLang);
                        modifiedModel = monaco.editor.createModel(defaultModified, initialMonacoLang);

                        diffEditor.setModel({
                            original: originalModel,
                            modified: modifiedModel
                        });
                    });
                });

                watch(language, (newLang) => {
                    const monacoLang = getMonacoLanguage(newLang);
                    if (originalModel) monaco.editor.setModelLanguage(originalModel, monacoLang);
                    if (modifiedModel) monaco.editor.setModelLanguage(modifiedModel, monacoLang);
                });

                watch(inlineView, (isInline) => {
                    if (diffEditor) diffEditor.updateOptions({ renderSideBySide: !isInline });
                });

                return { language, inlineView };
            }
        }).mount('#app');
    </script>
</body>
</html>
